{% load static %}
<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Time Planner{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">
    <link href="{% static 'tasks/css/styles.css' %}" rel="stylesheet">
  </head>
  <body class="app-shell">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-lg">
      <div class="container-lg">
        <a class="navbar-brand fw-bold" href="{% url 'task_list' %}">Time Planner</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'task_list' %}">Домашня</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'task_stats' %}">Статистика</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'task_create' %}">Додати завдання</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="app-content">
      <div class="container-lg py-5">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="footer mt-auto py-4 bg-dark text-white text-center">
      <div class="container-lg">
        <p class="mb-0">Time Planner &middot; Організуйте свої завдання стильно та просто.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
  </body>
</html>
